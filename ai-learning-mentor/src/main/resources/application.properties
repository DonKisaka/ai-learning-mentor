spring.application.name=ai-learning-mentor

# Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/learningmentor
spring.datasource.username=learningmentor
spring.datasource.password=learningmentorpassword
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
